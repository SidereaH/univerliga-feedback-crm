services:
  crm-postgres:
    image: postgres:16
    container_name: crm-postgres
    environment:
      POSTGRES_DB: univerliga_crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    ports:
      - "5432:5432"
    volumes:
      - crm_pg_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  keycloak-postgres:
    image: postgres:16
    container_name: keycloak-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak_pg_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    depends_on:
      - keycloak-postgres
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

  crm-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-service
    environment:
      DB_URL: jdbc:postgresql://crm-postgres:5432/univerliga_crm
      DB_USERNAME: crm
      DB_PASSWORD: crm
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/univerliga/protocol/openid-connect/certs
    ports:
      - "8080:8080"
    depends_on:
      - crm-postgres
      - rabbitmq
      - keycloak

volumes:
  crm_pg_data:
  keycloak_pg_data:
